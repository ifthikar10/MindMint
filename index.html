<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Home</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="home">
  <header class="site-header">
  <div class="header-left">
    <button class="icon-button" id="menuButton" type="button" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <a class="brand" href="index.html">Logo</a>
  </div>

  <div class="header-center">
    <form class="search-form" action="#" method="get">
      <input
        type="search"
        class="search-input"
        id="siteSearch"
        name="q"
        placeholder="Search........"
        aria-label="Search quizzes"
      />
      <button class="search-button" type="submit" aria-label="Search">
        🔍
      </button>
    </form>
  </div>

  <div class="header-right">
    <a class="btn btn--small" href="login.html">Log In</a>
    <a class="btn btn--small" href="signup.html">Sign Up</a>
  </div>
</header>

<nav class="category-nav" id="categoryNav" aria-label="Quiz categories">
  <a href="instructions.html?category=personality">Personality</a>
  <a href="instructions.html?category=fashion">Fashion</a>
  <a href="instructions.html?category=travel">Travel</a>
  <a href="instructions.html?category=color">Color</a>
  <a href="instructions.html?category=love">Love</a>
  <a href="instructions.html?category=pets">Pets</a>
  <a href="index.html#more">Explore More...</a>
</nav>

  <main class="page-shell">
    <section class="hero">
      <h1>Choose a Quiz Category</h1>
      <p>
        Bright, playful quizzes made for young users, with visual cards and easy navigation.
      </p>
    </section>

    <section class="category-grid" id="categoryGrid">
      <!-- JS inserts category cards here -->
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 Your Website. All rights reserved.</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
